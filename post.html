<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>$title$ | Mike</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>

<nav>
    <div class="container">
        <a href="/" class="nav-logo">mike<span>@sys</span></a>
        <ul class="nav-links">
            <li><a href="/">home</a></li>
            <li><a href="/#projects">projects</a></li>
            <li><a href="/blog/" class="active">blog</a></li>
            <li><a href="/#contact">contact</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <header class="post-header">
        <div class="post-meta">
            <span>$date$</span>
            <span>$for(tags)$$tags$$sep$ · $endfor$</span>
        </div>
        <h1 class="post-title">$title$</h1>
    </header>

    <article class="post-body">
        $body$
    </article>

    <div style="margin-top: var(--sp-16); padding-top: var(--sp-8); border-top: 1px solid var(--border);">
        <a href="/blog/" class="btn btn-ghost">← all posts</a>
    </div>
</div>

<footer>
    <div class="container">
        <p>← <a href="/">back home</a></p>
    </div>
</footer>

<script src="/assets/js/main.js"></script>
</body>
</html>
